name: PayrollOS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend Tests ───────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payrolldb_test
          POSTGRES_USER: payroll
          POSTGRES_PASSWORD: test_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://payroll:test_secret@localhost:5432/payrolldb_test
        run: |
          cd backend
          psql postgresql://payroll:test_secret@localhost:5432/payrolldb_test < ../database/init.sql

      - name: Run unit tests (calculator)
        run: |
          cd backend
          python -m pytest tests/test_calculator.py tests/test_extended.py -v --tb=short

      - name: Run unit tests with coverage
        run: |
          cd backend
          python -m pytest tests/test_calculator.py tests/test_extended.py \
            --cov=services/calculator \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Syntax check all Python files
        run: |
          cd backend
          python -m py_compile main.py config.py database.py models.py
          find routes services utils middleware -name "*.py" -exec python -m py_compile {} \;
          echo "All Python files syntax OK"

  # ── Frontend Tests ──────────────────────────────────────────
  test-frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build production bundle
        run: cd frontend && npm run build
        env:
          REACT_APP_API_URL: https://api.example.com
          CI: false   # Don't fail on warnings

      - name: Check bundle size
        run: |
          SIZE=$(du -sh frontend/build | cut -f1)
          echo "Build size: $SIZE"

  # ── Security Scan ───────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit security scan (Python)
        run: |
          cd backend
          bandit -r . -x __pycache__,.venv,venv,tests --severity-level medium \
            -f txt || true   # Report but don't fail CI on medium findings

      - name: Safety check (dependency vulnerabilities)
        run: |
          cd backend
          safety check -r requirements.txt || true

  # ── Build & Push Docker Images ──────────────────────────────
  build-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}

  # ── Deploy to Production ────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/payrollos
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            echo "Deploy complete: $(date)"

      - name: Health check after deploy
        run: |
          sleep 15
          curl -f https://api.${{ secrets.DOMAIN }}/health || exit 1
          echo "Health check passed"

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "PayrollOS deployed to production: ${{ job.status }} — ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
