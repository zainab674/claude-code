upstream payroll_api {
    server backend:8000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Frontend (React SPA) ──────────────────────────────────
    root /var/www/payrollos/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets — long cache
    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://payroll_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS handled by FastAPI
    }

    # Stricter rate limit on auth endpoints
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass       http://payroll_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Paystub PDF downloads — no rate limit needed (auth protected)
    location /api/paystubs/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass       http://payroll_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering  off;
        proxy_read_timeout 120s;
    }

    # API docs — restrict in production
    location /api/docs {
        # Uncomment to restrict to internal IPs only:
        # allow 10.0.0.0/8;
        # deny all;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://payroll_api;
    }

    # Health check — no auth, no rate limit
    location /health {
        proxy_pass http://payroll_api/health;
        access_log off;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}
